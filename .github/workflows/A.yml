name: ErfanGSIs-build-Aonly

on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: 'ROM_URL'
        required: true
      ROM_TYPE:
        description: 'ROM_TYPE'
        required: true
      RELEASE_NAME:
        description: 'RELEASE_NAME'
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
       - name: Checkout
         uses: actions/checkout@master

       - name: Initialization environment
         run: |
            sudo -E apt-get -qq update
            sudo -E apt-get -qq install -y git wget python3-pip

       # 核心修复1：使用最新、最活跃的原始仓库
       - name: Clone ErfanGSI Source Code
         run: |
            git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git ErfanGSIs

       - name: Setting up requirements
         run: |
              cd ErfanGSIs
              mkdir -p ./output
              # 跳过不兼容的 pycrypto 安装
              sed -i 's/pip install pycrypto//g' setup.sh
              bash setup.sh
              # 确保挂载相关工具可用
              sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs

       # 核心修复2：处理固件支持，构建前先强制清理残留挂载点
       - name: Build GSI with Retry Logic
         run: |
              cd ErfanGSIs
              # 强制清理可能残留的挂载点，避免干扰
              sudo umount -l working/system 2>/dev/null || true
              sudo rm -rf working

              # 尝试使用 Generic 模式构建
              ROM_URL="${{ github.event.inputs.ROM_URL }}"
              ROM_TYPE="${{ github.event.inputs.ROM_TYPE }}"
              
              # 先尝试指定的ROM_TYPE
              if ! sudo bash ./url2GSI.sh "$ROM_URL" "$ROM_TYPE" aonly; then
                echo "指定类型构建失败，尝试使用 Generic 模式..."
                # 如果失败，回退到 Generic 模式（适用于大多数Android 10+设备）
                sudo bash ./url2GSI.sh "$ROM_URL" Generic aonly
              fi

       - name: Pack GSI
         run: |
              # 检查并打包生成的镜像
              cd ErfanGSIs/output
              if ls *.img 1> /dev/null 2>&1; then
                tar -czvf GSI.tar.gz *.img
                echo "GSI打包成功"
              else
                echo "未找到生成的GSI镜像文件，构建可能失败"
                exit 1
              fi

       - name: Upload GSI
         uses: ncipollo/release-action@v1.8.6
         with:
           artifacts: ErfanGSIs/output/*.img,ErfanGSIs/output/GSI.tar.gz
           name: "${{ github.event.inputs.RELEASE_NAME }}"
           tag: "${{ github.event.inputs.RELEASE_NAME }}"
           token: ${{ secrets.GITHUB_TOKEN }}
