name: ErfanGSIs-build

on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: 'ROM直链下载地址'
        required: true
      ROM_TYPE:
        description: 'ROM类型（MIUI/Generic等）'
        required: true
        default: 'Generic'
      RELEASE_NAME:
        description: '发布名称'
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
       - name: Checkout
         uses: actions/checkout@v3

       - name: 初始化环境与依赖
         run: |
            sudo apt-get -qq update
            sudo apt-get -qq install -y git wget python3-pip brotli android-sdk-libsparse-utils e2fsprogs xz-utils

       # 使用更活跃的修复版 ErfanGSIs 仓库
       - name: 克隆 ErfanGSIs 工具（ponces 维护版）
         run: |
            git clone --recurse-submodules https://github.com/ponces/ErfanGSIs.git ErfanGSIs
            cd ErfanGSIs
            # 确保 sdat2img 可执行
            chmod +x tools/sdat2img.py

       - name: 安装 Python 依赖
         run: |
            cd ErfanGSIs
            # 跳过可能冲突的 pycrypto，安装必要模块
            sed -i 's/pip install pycrypto//g' setup.sh
            bash setup.sh
            pip3 install --user protobuf

       - name: 清理残留挂载点
         run: |
            sudo umount -l ErfanGSIs/working/system 2>/dev/null || true
            sudo rm -rf ErfanGSIs/working ErfanGSIs/tmp ErfanGSIs/output

       - name: 构建 GSI（使用 Generic 模式）
         run: |
            cd ErfanGSIs
            ROM_URL="${{ github.event.inputs.ROM_URL }}"
            ROM_TYPE="${{ github.event.inputs.ROM_TYPE }}"
            echo "开始构建，ROM类型：$ROM_TYPE"
            
            # 直接使用 Generic 模式，它对 Brotli 压缩的 MIUI 包兼容性最好
            sudo bash ./url2GSI.sh "$ROM_URL" Generic aonly

       - name: 检查生成结果并打包
         run: |
            cd ErfanGSIs/output
            if ls *.img 1> /dev/null 2>&1; then
              echo "✅ GSI 镜像生成成功："
              ls -lh *.img
              tar -czvf GSI.tar.gz *.img
            else
              echo "❌ 未找到生成的 GSI 镜像，构建失败"
              exit 1
            fi

       - name: 上传发布
         uses: ncipollo/release-action@v1.8.6
         with:
           artifacts: ErfanGSIs/output/*.img,ErfanGSIs/output/GSI.tar.gz
           name: "${{ github.event.inputs.RELEASE_NAME }}"
           tag: "${{ github.event.inputs.RELEASE_NAME }}"
           token: ${{ secrets.GITHUB_TOKEN }}
